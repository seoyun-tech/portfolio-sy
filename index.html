<!doctype html>
<html lang="en" class="one-page-layout">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Park Seo‑yun – Fashion MD</title>
  <link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer"/>
  <link rel="stylesheet" href="/src/styles/fontello.css"/>
  <link rel="stylesheet" href="/src/styles/style.css"/>
</head>
<body>
<div class="nprogress-bar" id="nprogress-bar"></div>
<div class="nprogress-spinner" id="nprogress-spinner" aria-hidden="true"><div class="spinner-icon"></div></div>

<div class="site" id="site">
  <main class="site-main">
    <article class="page-layout">

      <section class="card-layout" id="card-layout">
        <div class="card-intro">
          <h1>Park Seo‑yun</h1>
          <p>브랜드 이미지 재설계로 온라인 매출 10% 성장. 상품기획부터 촬영 기획, SNS 전략까지 직접 실행했습니다.</p>
          <div class="card-triggers">
            <a href="#" class="button">Download CV</a>
            <a href="#" class="button" id="discover-btn">Discover</a>
          </div>
        </div>

        <div id="card" class="card">
          <div class="cover" id="cover">
            <div class="cover-media" data-image-url="/cover.jpg" style="background-image:url(/cover.jpg)"></div>
            <div class="card-info">
              <h2><a href="#/">Park Seo‑yun</a></h2>
              <h3>Fashion MD</h3>
              <div class="card-desc"><p>브랜드 이미지 재설계로 온라인 매출 10% 성장. 상품기획부터 촬영 기획, SNS 전략까지 직접 실행했습니다.</p></div>
            </div>
            <nav class="card-nav menu-with-icons" aria-label="Primary">
              <ul>
                <li><a href="#/about-me" data-route="about-me"><i class="fa-solid fa-user" aria-hidden="true"></i>About Me</a></li>
                <li><a href="#/resume" data-route="resume"><i class="fa-solid fa-id-card" aria-hidden="true"></i>Resume</a></li>
                <li><a href="#/portfolio" data-route="portfolio"><i class="fa-solid fa-lightbulb" aria-hidden="true"></i>Portfolio</a></li>
                <li><a href="#/contact" data-route="contact"><i class="fa-solid fa-at" aria-hidden="true"></i>Contact</a></li>
              </ul>
            </nav>
            <a class="cover-link" href="#" id="cover-link" aria-label="Open card"></a>
          </div>

          <div class="card-3d-right-side" style="background-image:url(/cover.jpg)" aria-hidden="true"></div>
          <div class="card-3d-bottom-side" style="background-image:url(/cover.jpg)" aria-hidden="true"></div>

          <div class="card-content" id="card-content" hidden></div>
        </div>
        <a href="#" class="close-card" id="cover-close" aria-label="Close"></a>
      </section>

      <div class="card-footer" id="card-footer">
        <h1><a href="#card" class="go-top" id="card-go-top">go to top</a></h1>
      </div>
      <footer class="site-footer" id="site-footer">
        <div class="site-info">
          <p>Copyright © 2026 Park Seo‑yun</p>
        </div>
      </footer>

    </article>
  </main>
</div>

<div class="p-overlay"></div>
<div class="p-overlay"></div>

<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/magnific-popup.js/1.2.0/jquery.magnific-popup.min.js"></script>
<script type="module" src="/src/main.js"></script>
</body>
</html>
